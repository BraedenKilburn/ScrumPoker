services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
      - ./shared:/shared
      - /app/node_modules
    env_file:
      - ./frontend/.env.development
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/usr/src/app
      - ./shared:/shared
      - /usr/src/app/node_modules
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  default:
    driver: bridge
